<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay! 🎉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="stars-bg"></div>

    <div class="container yes-container">
        <div class="birthday-badge">🎂 April 17th 🎂</div>
        <h1 class="yes-title">Knew it! You always had a soft corner 🎉</h1>

        <div class="gif-container">
            <img id="cat-gif" src="https://media.tenor.com/eNHbizSfVb0AAAAj/lovemode-cute.gif" alt="celebrating">
        </div>

        <p class="yes-message">
            Happy Birthday, Neha! 🌸<br>
            <span class="yes-sub">సుఖదుఃఖాల్లో కలిసి నడిచే ప్రయాణమే జీవితమని నేను నమ్ముతాను!</span><br><br>
            Here's to new beginnings — one step at a time. 💛
        </p>
    </div>

    <audio id="bg-music" loop>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script src="yes-script.js"></script>
</body>
</html>
