<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Neha! 🎂</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mascots.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="stars-bg"></div>

    <div class="container landing-container">
        <div class="birthday-badge">🎂 April 17th 🎂</div>

        <div class="landing-cake">🎂</div>

        <h1 class="landing-title">Happy Birthday, Neha!</h1>

        <p class="landing-message">
            Wishing you a day as bright and beautiful as you are. 🌸<br><br>
            Hope this year brings you everything you've been working towards —<br>
            the GMAT, your dreams, and a lot of good surprises. ✨
        </p>

        <button class="reveal-btn" onclick="window.location.href='proposal.html'">
            Wait... there's something more 🎁
        </button>
    </div>

    <audio id="bg-music" loop autoplay muted>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusicLanding()" title="Toggle music">🔊</button>

    <script>
        // Confetti on load
        window.addEventListener('load', () => {
            confetti({ particleCount: 120, spread: 100, origin: { x: 0.5, y: 0.2 },
                colors: ['#f9a8d4','#fbbf24','#c084fc','#34d399','#60a5fa','#fb7185','#fff'] })
        })

        // Music autoplay
        const music = document.getElementById('bg-music')
        let musicPlaying = true
        music.muted = true
        music.volume = 0.3
        music.play().then(() => { music.muted = false }).catch(() => {
            document.addEventListener('click', () => {
                music.muted = false
                music.play().catch(() => {})
            }, { once: true })
        })

        function toggleMusicLanding() {
            if (musicPlaying) {
                music.pause(); musicPlaying = false
                document.getElementById('music-toggle').textContent = '🔇'
            } else {
                music.muted = false; music.play(); musicPlaying = true
                document.getElementById('music-toggle').textContent = '🔊'
            }
        }
    </script>
    <script src="music-sync.js"></script>
    <script src="mascots.js"></script>
</body>
</html>
